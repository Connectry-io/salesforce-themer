<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Generate Share Images — Dev Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
  .actions { display: flex; gap: 12px; margin-bottom: 32px; }
  button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .preview { border-radius: 12px; overflow: hidden; background: #1e293b; }
  .preview canvas { width: 100%; height: auto; display: block; }
  .preview-info { padding: 8px 12px; font-size: 12px; color: #94a3b8; display: flex; justify-content: space-between; }
  .preview-info a { color: #60a5fa; text-decoration: none; font-size: 11px; }
  .status { font-size: 12px; color: #22c55e; margin-top: 8px; }
</style>
</head>
<body>
<h1>Share Image Generator</h1>
<p>Generates 1200×1200 branded share images for all preset themes. Open this page from the extension (chrome-extension://…/dev/generate-share-images.html).</p>
<div class="actions">
  <button class="btn-primary" id="generateBtn">Generate All</button>
</div>
<div id="status"></div>
<div class="grid" id="grid"></div>

<script src="generate-share-images.js"></script>
</body>
</html>
