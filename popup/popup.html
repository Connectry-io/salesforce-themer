<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce Themer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="6" cy="12" r="3.5" fill="#2D2D2D"/>
          <line x1="9.5" y1="12" x2="14.5" y2="12" stroke="#4A6FA5" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="12" r="3.5" fill="#4A6FA5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">Salesforce Themer</h1>
        <p class="header-subtitle">by Connectry</p>
      </div>
      <button class="header-expand-btn" id="openOptionsBtn" title="Open theme gallery" aria-label="Open full theme gallery">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M3 7.5h9M7.5 3l4.5 4.5L7.5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <!-- Auto mode bar -->
    <div class="auto-mode-bar" id="autoModeBar">
      <div class="auto-mode-toggle-row">
        <div class="auto-mode-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Follow system theme</span>
          <button class="auto-help-btn" id="autoHelpBtn" aria-label="Learn more about auto mode" title="How does this work?">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
              <path d="M7 6.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="7" cy="4.5" r="0.65" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <label class="toggle-switch" title="Follow system light/dark preference">
          <input type="checkbox" id="autoModeToggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="auto-help-tooltip" id="autoHelpTooltip" hidden>
        Automatically switches between your last selected light and dark theme based on your system's appearance setting.
      </div>
      <div class="auto-mode-status" id="autoModeStatus" hidden>
        <span class="auto-status-item">&#9728; <span id="autoLightName">Connectry Light</span></span>
        <span class="auto-status-dot">·</span>
        <span class="auto-status-item">&#9790; <span id="autoDarkName">Connectry Dark</span></span>
      </div>
    </div>

    <!-- Scope selector -->
    <div class="scope-bar" id="scopeBar">
      <span class="scope-label">Apply to</span>
      <div class="scope-pills" id="scopePills">
        <button class="scope-pill" data-scope="both">Both</button>
        <button class="scope-pill" data-scope="lightning">Lightning</button>
        <button class="scope-pill" data-scope="setup">Setup</button>
      </div>
    </div>

    <!-- Theme grid — dynamic, populated by popup.js from themes.json -->
    <main class="themes-section" id="themesSection" role="radiogroup" aria-label="Select a theme">
      <!-- populated by popup.js -->
    </main>

    <!-- Per-org section -->
    <div class="org-row" id="orgRow" hidden>
      <div class="org-status" id="orgStatus"></div>
    </div>

    <!-- Off button -->
    <div class="off-row">
      <button class="off-button" data-theme="none" role="radio" aria-checked="false">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="4.5" y1="4.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Turn Off
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://connectry.io" target="_blank" rel="noopener noreferrer">connectry.io</a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
