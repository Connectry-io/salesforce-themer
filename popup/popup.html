<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce Themer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="6" cy="12" r="3.5" fill="#2D2D2D"/>
          <line x1="9.5" y1="12" x2="14.5" y2="12" stroke="#4A6FA5" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="12" r="3.5" fill="#4A6FA5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">Salesforce Themer</h1>
        <p class="header-subtitle">by Connectry</p>
      </div>
    </header>

    <!-- Auto mode bar -->
    <div class="auto-mode-bar" id="autoModeBar">
      <div class="auto-mode-toggle-row">
        <div class="auto-mode-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Follow system theme</span>
          <button class="auto-help-btn" id="autoHelpBtn" aria-label="Learn more about auto mode" title="How does this work?">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
              <path d="M7 6.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="7" cy="4.5" r="0.65" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <label class="toggle-switch" title="Follow system light/dark preference">
          <input type="checkbox" id="autoModeToggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="auto-help-tooltip" id="autoHelpTooltip" hidden>
        Automatically switches between your last selected light and dark theme based on your system's appearance setting.
      </div>
      <div class="auto-mode-status" id="autoModeStatus" hidden>
        <span class="auto-status-item">☀️ <span id="autoLightName">Connectry Light</span></span>
        <span class="auto-status-dot">·</span>
        <span class="auto-status-item">🌙 <span id="autoDarkName">Connectry Dark</span></span>
      </div>
    </div>

    <!-- Theme grid -->
    <main class="themes-section" role="radiogroup" aria-label="Select a theme">

      <div class="theme-group-label">Light Themes</div>
      <div class="themes-grid">
        <button class="theme-card" data-theme="connectry" role="radio" aria-checked="false" title="Connectry Light — Clean, professional, Connectry brand identity">
          <div class="theme-swatch">
            <span style="background: #f7f7f5;"></span>
            <span style="background: #ffffff;"></span>
            <span style="background: #4a6fa5;"></span>
            <span style="background: #2d2d2d;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Connectry Light</span>
            <span class="theme-tag">Default</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>

        <button class="theme-card" data-theme="slate" role="radio" aria-checked="false" title="Slate — Professional muted greys">
          <div class="theme-swatch">
            <span style="background: #f8f9fa;"></span>
            <span style="background: #ffffff;"></span>
            <span style="background: #374151;"></span>
            <span style="background: #111827;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Slate</span>
            <span class="theme-desc">Minimal</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>

        <button class="theme-card" data-theme="arctic" role="radio" aria-checked="false" title="Arctic — Crisp ice blue light mode">
          <div class="theme-swatch">
            <span style="background: #f0f4f8;"></span>
            <span style="background: #ffffff;"></span>
            <span style="background: #2b6cb0;"></span>
            <span style="background: #1a202c;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Arctic</span>
            <span class="theme-desc">Ice blue</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>
      </div>

      <div class="theme-group-label">Dark Themes</div>
      <div class="themes-grid">
        <button class="theme-card" data-theme="connectry-dark" role="radio" aria-checked="false" title="Connectry Dark — Professional dark mode with Connectry brand identity">
          <div class="theme-swatch">
            <span style="background: #1a1d23;"></span>
            <span style="background: #22262e;"></span>
            <span style="background: #6d9fd4;"></span>
            <span style="background: #e8eaed;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Connectry Dark</span>
            <span class="theme-desc">Dark mode</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>

        <button class="theme-card" data-theme="midnight" role="radio" aria-checked="false" title="Midnight — Deep navy dark mode">
          <div class="theme-swatch">
            <span style="background: #0f1219;"></span>
            <span style="background: #1a1f2e;"></span>
            <span style="background: #60a5fa;"></span>
            <span style="background: #e2e8f0;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Midnight</span>
            <span class="theme-desc">Deep navy</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>

        <button class="theme-card" data-theme="tron" role="radio" aria-checked="false" title="Tron — Electric cyan on near-black">
          <div class="theme-swatch">
            <span style="background: #0a0a0f;"></span>
            <span style="background: #0d1117;"></span>
            <span style="background: #00e5ff;"></span>
            <span style="background: #e0f7fa;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Tron</span>
            <span class="theme-desc">Neon</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>

        <button class="theme-card" data-theme="obsidian" role="radio" aria-checked="false" title="Obsidian — Matte black and gold">
          <div class="theme-swatch">
            <span style="background: #0c0c0c;"></span>
            <span style="background: #161616;"></span>
            <span style="background: #d4a853;"></span>
            <span style="background: #e8e6e3;"></span>
          </div>
          <div class="theme-info">
            <span class="theme-name">Obsidian</span>
            <span class="theme-desc">Gold &amp; black</span>
          </div>
          <div class="theme-check" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="theme-auto-icon" aria-hidden="true"></div>
        </button>
      </div>

    </main>

    <!-- Per-org section -->
    <div class="org-row" id="orgRow" hidden>
      <div class="org-status" id="orgStatus"></div>
    </div>

    <!-- Off button -->
    <div class="off-row">
      <button class="off-button" data-theme="none" role="radio" aria-checked="false">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="4.5" y1="4.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Turn Off
      </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://connectry.io" target="_blank" rel="noopener noreferrer">connectry.io</a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
